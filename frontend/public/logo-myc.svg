<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="gradientM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#gradientBg)" stroke="url(#gradientM)" stroke-width="2" opacity="0.8"/>
  
  <!-- Glow Effect -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#gradientM)" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  
  <!-- M Letter with gradient -->
  <text x="50" y="65" font-family="'Space Grotesk', sans-serif" font-size="60" font-weight="700" 
        text-anchor="middle" fill="url(#gradientM)" filter="url(#glow)">
    M
  </text>
  
  <!-- AI text -->
  <text x="50" y="85" font-family="'Manrope', sans-serif" font-size="12" font-weight="600" 
        text-anchor="middle" fill="url(#gradientM)" opacity="0.9" letter-spacing="1">
    AI
  </text>
  
  <!-- Accent dots -->
  <circle cx="20" cy="20" r="3" fill="url(#gradientM)" opacity="0.6"/>
  <circle cx="80" cy="80" r="3" fill="url(#gradientM)" opacity="0.6"/>
</svg>